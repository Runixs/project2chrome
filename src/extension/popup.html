<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Project2Chrome</title>
    <style>
      body {
        margin: 0;
        padding: 12px;
        width: 320px;
        font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      textarea {
        width: 100%;
        min-height: 150px;
        box-sizing: border-box;
        font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      button {
        margin-top: 8px;
        width: 100%;
      }
      .status {
        margin-top: 8px;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <strong>Project2Chrome</strong>
    <p>Sync directly from Obsidian local bridge.</p>
    <label>
      Bridge URL
      <textarea id="bridge-url" style="min-height:56px" placeholder="http://127.0.0.1:27123/payload"></textarea>
    </label>
    <label>
      Bridge token
      <textarea id="bridge-token" style="min-height:56px" placeholder="project2chrome-local"></textarea>
    </label>
    <label style="display:block;margin-top:8px;">
      <input id="auto-sync" type="checkbox" /> Auto sync every 1 minute
    </label>
    <button id="save" type="button">Save Bridge Settings</button>
    <button id="sync" type="button">Sync From Obsidian</button>
    <div id="status" class="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
